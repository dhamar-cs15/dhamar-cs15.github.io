<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <nav>
            <a href="index.html" aria-label="Home"><img src="images/logo.jpg" class="logo" alt="logo"></a>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="art.html">Art</a></li>
            </ul>
        </nav>

        <main id="art-page">
            <h1 class="sub-title">Art & Illustrations - page in progress</h1>
            <div class="art-tabs" role="tablist" aria-label="Art categories">
                <button id="professional-projects-tab" class="tab-button" role="tab" aria-selected="false" aria-controls="professional-art" data-target="professional-art">Professional illustrations & logos</button>
                <button id="personal-projects-tab" class="tab-button active" role="tab" aria-selected="true" aria-controls="personal-art" data-target="personal-art">Personal projects</button>
            </div>

            <section class="art-gallery-container tab-panel active" id="personal-art" role="tabpanel" aria-labelledby="personal-projects-tab">
                <div class="art-grid cols-3">
                    <div class="art-item span-2"><img src="images/art/dhamar_art1.JPG" alt="Personal artwork 1"></div>
                    <div class="art-item"><img src="images/art/dhamar_art2.JPG" alt="Personal artwork 2"></div>
                    <div class="art-item"><img src="images/art/dhamar_art3.JPG" alt="Personal artwork 3"></div>
                    <div class="art-item"><img src="images/art/dhamar_art4.JPG" alt="Personal artwork 4"></div>
                    <div class="art-item"><img src="images/art/dhamar_art5.JPG" alt="Personal artwork 5"></div>
                </div>
            </section>

            <section class="art-gallery-container tab-panel" id="professional-art" role="tabpanel" aria-labelledby="professional-projects-tab" hidden>
                <div class="art-grid cols-4">
                    <div class="art-item span-2"><img src="images/art/wecode_tshirt.png" alt="Professional t-shirt design"></div>
                    <div class="art-item span-1"><img src="images/art/wecode_thankyou.jpg" alt="Professional thank you artwork"></div>
                    <div class="art-item"><img src="images/art/wecode_hoodie.JPG" alt="Professional hoodie design"></div>
                    <div class="art-item"><img src="images/art/axolotl_design1.JPG" alt="Professional axolotl artwork"></div>
                    <div class="art-item"><img src="images/art/axolotl_design2.JPG" alt="Professional axolotl design"></div>
                    <div class="art-item"><img src="images/art/axolotl_design3.JPG" alt="Professional axolotl composition"></div>
                    <div class="art-item"><img src="images/art/TGHI_dolphin.JPG" alt="Professional dolphin illustration"></div>
                    <div class="art-item"><img src="images/art/TGHI_otter.JPG" alt="Professional otter illustration"></div>
                    <div class="art-item"><img src="images/art/HCS- SHIRT DESIGN (1).png" alt="Professional shirt design"></div>
                    <div class="art-item"><img src="images/art/cs1200_ram.png" alt="Professional course design artwork"></div>
                </div>
            </section>
        </main>
    </div>

    <div class="art-lightbox" aria-hidden="true">
        <div class="art-lightbox-content" role="dialog" aria-modal="true">
            <button class="lightbox-close" aria-label="Close gallery">×</button>
            <button class="lightbox-nav lightbox-prev" aria-label="Previous image">‹</button>
            <figure class="lightbox-figure">
                <img class="lightbox-image" src="" alt="">
                <figcaption class="lightbox-caption"></figcaption>
            </figure>
            <button class="lightbox-nav lightbox-next" aria-label="Next image">›</button>
        </div>
    </div>

    <script src="art-gallery.js"></script>
</body>
</html>
