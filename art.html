<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container"> 
        <nav>
            <a href="index.html" aria-label="Home"><img src="images/logo.jpg" class="logo" alt="logo"></a>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="art.html">Art</a></li>
            </ul>
        </nav>
    </div> 
    
    <header class="page-header">
        <h1>Art & Illustrations</h1>
    </header>

    <div class="container">

        <main id="art-page">
            <div class="art-tabs" role="tablist">
                <button id="professional-projects-tab" class="tab-button active" role="tab" aria-selected="true" aria-controls="professional-art" data-target="professional-art">Professional illustrations & logos</button>
                <button id="personal-projects-tab" class="tab-button" role="tab" aria-selected="false" aria-controls="personal-art" data-target="personal-art">Personal projects</button>
            </div>

            <section class="art-gallery-container tab-panel active" id="professional-art" role="tabpanel" aria-labelledby="professional-projects-tab">
                <!-- art-gallery -->
            <div class="art-container">
                <div class="art-column">
                    <div class="art-item">
                        <img src="images/art/axolotl_design1.JPG" alt="art1">
                    </div>
                    <div class="art-item">
                        <img src="images/art/wecode_tshirt.png" alt="art2">
                    </div>
                    <div class="art-item">
                        <img src="images/art/cs1200_ram.png" alt="art3">
                    </div>
                    <div class="art-item">
                        <img src="images/art/BPL_card.jpg" alt="bpl_card">
                    </div>
                </div>
                <div class="art-column">
                    <div class="art-item">
                        <img src="images/art/axolotl_design2.JPG" alt="art3">
                    </div>
                    <div class="art-item">
                        <img src="images/art/wecode_thankyou.jpg" alt="">
                    </div>
                    <div class="art-item">
                        <img src="images/art/TGHI_dolphin.JPG" alt="art4">
                    </div>
                </div>
                <div class="art-column">
                    <div class="art-item">
                        <img src="images/art/axolotl_design3.JPG" alt="art5">
                    </div>
                    <div class="art-item">
                        <img src="images/art/HCS- SHIRT DESIGN (1).png" alt="art5">
                    </div>
                    <div class="art-item">
                        <img src="images/art/TGHI_otter.JPG" alt="art5">
                    </div>
                </div>
            </div>
            </section>

            <section class="art-gallery-container tab-panel" id="personal-art" role="tabpanel" aria-labelledby="personal-projects-tab" hidden>
                <!-- art-gallery -->
            <div class="art-container">
                <div class="art-column">
                    <div class="art-item">
                        <img src="images/art/dhamar_art1.JPG" alt="art1">
                    </div>
                    <div class="art-item">
                        <img src="images/art/dhamar_art2.JPG" alt="art2">
                    </div>
                    <div class="art-item">
                        <img src="images/art/wecode_tshirt.png" alt="art3">
                    </div>
                </div>
                <div class="art-column">
                    <div class="art-item">
                        <img src="images/art/dhamar_art3.JPG" alt="art3">
                    </div>
                    <div class="art-item">
                        <img src="images/art/dhamar_art5.JPG" alt="">
                    </div>
                    <div class="art-item">
                        <img src="images/art/dhamar_art4.JPG" alt="art4">
                    </div>
                </div>
                <div class="art-column">
                    <div class="art-item">
                        <img src="images/art/dhamar_art4.JPG" alt="art5">
                    </div>
                    <div class="art-item">
                        <img src="images/art/dhamar_art6.HEIC" alt="art5">
                    </div>
                    <div class="art-item">
                        <img src="images/art/wecode_hoodie.jpg" alt="art5">
                    </div>
                </div>
            </div>
            </section>
        </main>
    </div>

    <div class="art-lightbox" aria-hidden="true">
        <div class="art-lightbox-content" role="dialog" aria-modal="true">
            <button class="lightbox-close" aria-label="Close gallery">×</button>
            <button class="lightbox-nav lightbox-prev" aria-label="Previous image">‹</button>
            <figure class="lightbox-figure">
                <img class="lightbox-image" src="" alt="">
                <figcaption class="lightbox-caption"></figcaption>
            </figure>
            <button class="lightbox-nav lightbox-next" aria-label="Next image">›</button>
        </div>
    </div>

    <script src="art-gallery.js"></script>
</body>
</html>
