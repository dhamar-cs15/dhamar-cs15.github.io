<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sketch Gallery</title>
        <style>
            html, body {
                height: 100%;
                margin: 0;
                font-family: Arial, Helvetica, sans-serif;
            }
            .container {
                display: grid;
                grid-template-columns: 360px 1fr;
                height: 100%;
            }
            .sidebar {
                background: #1f2937;
                color: #fff;
                padding: 16px;
                box-sizing: border-box;
            }
            .sidebar h2 { margin: 0 0 12px 0; font-size: 20px }
            .list { display:flex; flex-direction: column; gap:8px }
            .list a {
                display:block; padding:10px 12px; text-decoration:none; color:inherit; background: #334155; border-radius:6px
            }
            .list a:hover { background: #475569 }
            .preview {
                background: #1f2937; border-left: 1px solid #e5e7eb;
            }
            iframe { width: 100%; height: 100%; border: 0 }
            .footer { margin-top: 10px; font-size: 16px; color: #cbd5e1; font-weight: 200;}
        </style>
    </head>
    <body>
        <div class="container">
            <div class="sidebar">
                <h2>Abstraction Levels</h2>
                <div class="list">
                    <a href="sketch1.html" target="preview">High Abstraction (Version 1)</a>
                    <a href="sketch2.html" target="preview">High Abstraction (Final)</a>
                    <a href="sketch3.html" target="preview">Medium Abstraction</a>
                    <a href="sketch4.html" target="preview">Low Abstraction</a>
                </div>
                <div class="footer">Click a version to generate a new design of it on the right.</div>
            </div>
            <div class="preview">
                <iframe name="preview" title="Sketch preview" src="sketch1.html"></iframe>
            </div>
        </div>
    </body>
</html>
